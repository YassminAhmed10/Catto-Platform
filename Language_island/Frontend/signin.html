<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Language Island</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@6.6.0/css/flag-icons.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/signin.css">
</head>
<body>

<div class="sky">
  <div class="sun" id="sun">
    <div class="sun-face">
      <div class="sun-eye left"></div>
      <div class="sun-eye right"></div>
      <div class="sun-smile"></div>
    </div>
  </div>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="star star-1">★</div>
  <div class="star star-2">★</div>
  <div class="star star-3">★</div>
  <div class="star star-4">★</div>
</div>

<header class="topbar">
  <div class="topbar-top">
    <a class="brand interactive" href="index.html" style="text-decoration:none;">
      <img src="imgs/Cattoimages/cattologo.png" class="brand-logo" alt="Language Island Logo">
      <span class="brand-name">Language<span class="brand-accent">Island</span></span>
    </a>
    <div class="topbar-right"></div>
  </div>
</header>

<main>
  <section class="auth-wrap">
    <div class="auth-mascot">
      <video class="auth-cat-video" id="authCatVideo" autoplay loop muted playsinline aria-label="Catto waving hello">
        <source src="imgs/Cattoimages/CattoHi.webm" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>

    <div class="auth-card">
      <div class="auth-card-logo">
        <img src="imgs/Cattoimages/cattologo.png" alt="Language Island" class="card-logo-img">
      </div>
      <h1 class="auth-title">Sign In</h1>

      <form id="signinForm" novalidate>
        <div class="field-group">
          <label class="field-label" for="email"><i class="fas fa-envelope"></i>Email</label>
          <div class="field-input-wrap">
            <input type="email" id="email" class="field-input" placeholder="you@example.com" autocomplete="email" required>
          </div>
          <div class="field-error" id="emailError"><i class="fas fa-exclamation-circle"></i>Please enter a valid email</div>
        </div>

        <div class="field-group">
          <label class="field-label" for="password"><i class="fas fa-lock"></i>Password</label>
          <div class="field-input-wrap">
            <input type="password" id="password" class="field-input" placeholder="Enter your password" autocomplete="current-password" required>
            <button type="button" class="toggle-pass" id="togglePass" aria-label="Show password"><i class="fas fa-eye"></i></button>
          </div>
          <div class="field-error" id="passwordError"><i class="fas fa-exclamation-circle"></i>Password is required</div>
        </div>

        <div class="field-row-between">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe">
            Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="auth-submit">
          Sign In <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <div class="auth-divider">or continue with</div>
      <div class="social-row">
        <button type="button" class="social-btn google interactive"><i class="fab fa-google"></i>Google</button>
        <button type="button" class="social-btn apple interactive"><i class="fab fa-apple"></i>Apple</button>
      </div>

      <p class="auth-switch">New to Language Island? <a href="signup.html">Create an account</a></p>
    </div>
  </section>
</main>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMessage">Signed in!</span></div>

<script src="assets/js/sounds.js"></script>
<script src="assets/js/auth-ui.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/signin.js"></script>
</body>
</html>
