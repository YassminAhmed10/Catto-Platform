<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Language Island</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  
  <style>
    .interactive { 
      transition: all 0.2s ease; 
      cursor: pointer; 
    }
    .interactive:hover { 
      transform: scale(1.05) !important; 
      filter: brightness(1.1); 
    }
    .interactive:active { 
      transform: scale(0.95) !important; 
    }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .topbar {
      flex: 0 0 auto;
      padding: 8px clamp(20px, 5vw, 60px) 0;
    }

    main {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      overflow: hidden;
      align-items: center;
      justify-content: center;
      padding: 10px 0;
    }

    .brand-logo { 
      height: 60px; 
      width: auto; 
      margin-right: 10px; 
      vertical-align: middle;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); 
      transition: transform 0.3s ease; 
    }
    .brand-logo:hover { 
      transform: scale(1.05) rotate(-2deg); 
    }
    .brand { 
      display: flex; 
      align-items: center; 
      gap: 8px; 
    }

    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.95); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shake { 
      0%, 100% { transform: translateX(0); } 
      25% { transform: translateX(-6px); } 
      75% { transform: translateX(6px); } 
    }

    .auth-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 0 4%;
      box-sizing: border-box;
      max-width: 1300px;
      margin: 0 auto;
    }

    .auth-mascot {
      flex: 0 0 300px;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .auth-cat-video {
      width: auto;
      max-width: 25rem;
      height: auto;
      max-height: 60rem;
      object-fit: contain;
      cursor: pointer;
      transition: transform 0.3s ease;
      display: block;
      background: transparent;
      border: none;
    }

    .auth-cat-video:hover {
      transform: scale(1.02);
    }

    .auth-card {
      flex: 0 0 480px;
      max-width: 480px;
      width: 100%;
      background: var(--white);
      border-radius: 24px;
      box-shadow: 0 12px 0 rgba(46,38,87,0.08), 0 0 40px rgba(255,216,142,0.2);
      border: 3px solid #F1EEFB;
      animation: bounceIn 0.5s ease;
      padding: 16px 28px 18px;
      max-height: 92vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 10;
    }

    /* Custom scrollbar for the card */
    .auth-card::-webkit-scrollbar {
      width: 4px;
    }
    .auth-card::-webkit-scrollbar-track {
      background: #F1EEFB;
      border-radius: 10px;
    }
    .auth-card::-webkit-scrollbar-thumb {
      background: var(--coral);
      border-radius: 10px;
    }

    .auth-card-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 2px;
      flex-shrink: 0;
    }

    .card-logo-img {
      height: 4rem;
      width: auto;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1));
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }

    .auth-title {
      font-family: var(--font-display);
      font-size: 22px;
      color: var(--plum);
      text-align: center;
      margin: 0 0 6px;
      flex-shrink: 0;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
      flex-shrink: 0;
    }

    .field-group {
      margin-bottom: 4px;
    }

    .field-group.full-width {
      grid-column: 1 / -1;
    }

    .field-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 11px;
      color: var(--plum);
      margin-bottom: 2px;
    }

    .field-label .fa {
      color: var(--coral);
      font-size: 12px;
    }

    .field-input-wrap {
      position: relative;
    }

    .field-input {
      width: 100%;
      box-sizing: border-box;
      padding: 7px 12px;
      border-radius: 10px;
      border: 2.5px solid #E3DFF5;
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--plum);
      background: #FBFAFF;
      transition: all 0.2s ease;
      outline: none;
    }

    .field-input::placeholder {
      color: #B9B3D9;
      font-weight: 600;
      font-size: 11px;
    }

    .field-input:focus {
      border-color: var(--star);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(255,210,63,0.15);
    }

    .field-input.error {
      border-color: var(--coral);
      animation: shake 0.3s ease;
    }

    .field-input[type="date"] {
      padding: 6px 12px;
    }

    .gender-options {
      display: flex;
      gap: 14px;
      margin-top: 2px;
      justify-content: center;
    }

    .gender-option {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 12px;
      color: var(--plum);
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 4px 14px;
      border-radius: 8px;
      border: 2px solid #E3DFF5;
      background: #FBFAFF;
      flex: 0 1 auto;
    }

    .gender-option:hover {
      transform: scale(1.04);
      border-color: var(--star);
      background: var(--white);
    }

    .gender-option input[type="radio"] {
      width: 14px;
      height: 14px;
      accent-color: var(--coral);
      cursor: pointer;
    }

    .gender-option .fa {
      font-size: 14px;
    }

    .toggle-pass {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--plum-soft);
      cursor: pointer;
      font-size: 13px;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .toggle-pass:hover {
      transform: translateY(-50%) scale(1.2);
      color: var(--coral);
    }

    .field-error {
      font-size: 10px;
      font-weight: 700;
      color: var(--coral);
      margin-top: 2px;
      display: none;
      align-items: center;
      gap: 4px;
    }

    .field-error.show {
      display: flex;
    }

    .field-hint {
      font-size: 10px;
      font-weight: 700;
      color: var(--plum-soft);
      margin-top: 2px;
    }

    .strength-meter {
      display: flex;
      gap: 4px;
      margin-top: 3px;
    }

    .strength-bar {
      flex: 1;
      height: 4px;
      border-radius: 3px;
      background: #EDEAFA;
      transition: background 0.2s ease;
    }

    .strength-bar.weak { background: var(--coral); }
    .strength-bar.medium { background: var(--star); }
    .strength-bar.strong { background: var(--grass); }

    .auth-submit {
      width: 100%;
      background: var(--coral);
      color: var(--white);
      border: none;
      border-radius: 999px;
      padding: 9px 16px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 0 var(--coral-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s ease;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .auth-submit:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 6px 0 var(--coral-dark), 0 0 20px rgba(255,111,89,0.3);
    }

    .auth-submit:active {
      transform: translateY(2px) scale(0.98);
      box-shadow: 0 2px 0 var(--coral-dark);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0 6px;
      color: var(--plum-soft);
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 2px;
      background: #EDEAFA;
      border-radius: 2px;
    }

    .social-row {
      display: flex;
      gap: 10px;
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px;
      border-radius: 10px;
      border: 2.5px solid #E3DFF5;
      background: var(--white);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 11px;
      color: var(--plum);
      cursor: pointer;
      box-shadow: 0 3px 0 rgba(46,38,87,0.08);
      transition: all 0.2s ease;
    }

    .social-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 5px 0 rgba(46,38,87,0.08), 0 0 16px rgba(255,210,63,0.3);
      border-color: var(--star);
    }

    .social-btn:active {
      transform: translateY(1px) scale(0.97);
      box-shadow: 0 2px 0 rgba(46,38,87,0.08);
    }

    .social-btn.google .fa { color: #EA4335; }
    .social-btn.apple .fa { color: #111; }

    .auth-switch {
      text-align: center;
      margin-top: 6px;
      font-weight: 700;
      color: var(--plum-soft);
      font-size: 12px;
      flex-shrink: 0;
    }

    .auth-switch a {
      color: var(--coral);
      text-decoration: none;
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .auth-switch a:hover {
      text-decoration: underline;
      transform: scale(1.06);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--grass);
      color: var(--white);
      padding: 10px 18px;
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: #C94E4E;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .auth-wrap { gap: 30px; padding: 0 3%; }
      .auth-mascot { flex: 0 0 250px; max-width: 250px; }
      .auth-cat-video { max-height: 250px; }
      .auth-card { flex: 0 0 420px; max-width: 420px; padding: 14px 22px 16px; }
    }

    @media (max-width: 820px) {
      .auth-wrap { 
        flex-direction: column; 
        gap: 6px; 
        padding: 6px 16px 10px; 
        justify-content: flex-start; 
        overflow-y: auto; 
        height: auto; 
      }
      html, body { 
        overflow: auto; 
        height: auto; 
      }
      body { 
        display: block; 
      }
      main { 
        display: block; 
        overflow: visible; 
        padding: 10px 0;
      }
      .auth-mascot { 
        flex: 0 0 auto; 
        max-width: 140px; 
        margin-top: 4px; 
      }
      .auth-cat-video { 
        max-height: 13rem; 
      }
      .auth-card { 
        flex: 0 0 auto; 
        max-width: 100%; 
        width: 100%; 
        padding: 12px 16px 14px; 
        max-height: none; 
        overflow: visible; 
      }
      .form-grid { 
        grid-template-columns: 1fr 1fr; 
        gap: 3px 8px; 
      }
      .brand-logo { height: 8rem; }
      .card-logo-img { height: 8rem; }
      .auth-title { font-size: 18px; }
      .field-input { padding: 6px 10px; font-size: 11px; }
      .field-label { font-size: 10px; }
      .gender-option { padding: 3px 10px; font-size: 11px; }
    }

    @media (max-width: 480px) {
      .auth-wrap { padding: 4px 8px 8px; }
      .auth-mascot { max-width: 100px; }
      .auth-cat-video { max-height: 9rem; }
      .auth-card { 
        padding: 8px 12px 10px; 
        border-radius: 16px; 
      }
      .form-grid { 
        grid-template-columns: 1fr; 
        gap: 2px; 
      }
      .field-group.full-width { grid-column: 1; }
      .field-group { margin-bottom: 2px; }
      .field-label { font-size: 9px; margin-bottom: 2px; }
      .field-input { 
        padding: 5px 8px; 
        font-size: 10px; 
        border-radius: 8px; 
      }
      .gender-options { gap: 8px; }
      .gender-option { 
        padding: 3px 8px; 
        font-size: 10px; 
      }
      .auth-title { font-size: 16px; }
      .auth-submit { 
        padding: 7px 12px; 
        font-size: 12px; 
      }
      .social-btn { 
        padding: 5px; 
        font-size: 9px; 
      }
      .card-logo-img { height: rem; }
      .brand-logo { height: 9rem; }
      .auth-divider { 
        font-size: 9px; 
        margin: 4px 0; 
      }
      .auth-switch { 
        font-size: 10px; 
        margin-top: 4px; 
      }
    }
  </style>
</head>
<body>

<div class="sky">
  <div class="sun" id="sun">
    <div class="sun-face">
      <div class="sun-eye left"></div>
      <div class="sun-eye right"></div>
      <div class="sun-smile"></div>
    </div>
  </div>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="star star-1">★</div>
  <div class="star star-2">★</div>
  <div class="star star-3">★</div>
  <div class="star star-4">★</div>
</div>

<header class="topbar">
  <div class="topbar-top">
    <a class="brand interactive" href="index.html" style="text-decoration:none;">
      <img src="imgs/Cattoimages/cattologo.png" class="brand-logo" alt="Language Island Logo">
    </a>
  </div>
</header>

<main>
  <section class="auth-wrap">
    <div class="auth-mascot">
      <video class="auth-cat-video" id="authCatVideo" autoplay loop muted playsinline aria-label="Catto waving hello">
        <source src="imgs/Cattoimages/CattoHi.webm" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>

    <div class="auth-card">
      <div class="auth-card-logo">
        <img src="imgs/Cattoimages/cattologo.png" alt="Language Island" class="card-logo-img">
      </div>
      <h1 class="auth-title">Sign Up</h1>

      <form id="signupForm" novalidate>
        <div class="form-grid">
          <div class="field-group">
            <label class="field-label" for="firstName"><i class="fas fa-user"></i>First Name</label>
            <div class="field-input-wrap">
              <input type="text" id="firstName" class="field-input" placeholder="First name" autocomplete="given-name" required>
            </div>
            <div class="field-error" id="firstNameError"><i class="fas fa-exclamation-circle"></i>Required</div>
          </div>

          <div class="field-group">
            <label class="field-label" for="lastName"><i class="fas fa-user"></i>Last Name</label>
            <div class="field-input-wrap">
              <input type="text" id="lastName" class="field-input" placeholder="Last name" autocomplete="family-name" required>
            </div>
            <div class="field-error" id="lastNameError"><i class="fas fa-exclamation-circle"></i>Required</div>
          </div>

          <div class="field-group full-width">
            <label class="field-label" for="dob"><i class="fas fa-calendar-alt"></i>Date of Birth</label>
            <div class="field-input-wrap">
              <input type="date" id="dob" class="field-input">
            </div>
            <div class="field-error" id="dobError"><i class="fas fa-exclamation-circle"></i>Please enter your date of birth</div>
          </div>

          <div class="field-group full-width">
            <label class="field-label" style="justify-content:center;"><i class="fas fa-venus-mars"></i>Gender</label>
            <div class="gender-options">
              <label class="gender-option">
                <input type="radio" name="gender" value="girl"> <i class="fas fa-female" style="color:#FF6B9D;"></i> Girl
              </label>
              <label class="gender-option">
                <input type="radio" name="gender" value="boy"> <i class="fas fa-male" style="color:#4A90D9;"></i> Boy
              </label>
            </div>
            <div class="field-error" id="genderError" style="justify-content:center;"><i class="fas fa-exclamation-circle"></i>Please select your gender</div>
          </div>

          <div class="field-group full-width">
            <label class="field-label" for="signupEmail"><i class="fas fa-envelope"></i>Email</label>
            <div class="field-input-wrap">
              <input type="email" id="signupEmail" class="field-input" placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="field-error" id="signupEmailError"><i class="fas fa-exclamation-circle"></i>Valid email required</div>
          </div>

          <div class="field-group full-width">
            <label class="field-label" for="signupPassword"><i class="fas fa-lock"></i>Password</label>
            <div class="field-input-wrap">
              <input type="password" id="signupPassword" class="field-input" placeholder="Create a password" autocomplete="new-password" required>
              <button type="button" class="toggle-pass" id="toggleSignupPass" aria-label="Show password"><i class="fas fa-eye"></i></button>
            </div>
            <div class="strength-meter">
              <div class="strength-bar" id="bar1"></div>
              <div class="strength-bar" id="bar2"></div>
              <div class="strength-bar" id="bar3"></div>
            </div>
            <div class="field-hint" id="strengthHint">At least 8 characters</div>
            <div class="field-error" id="signupPasswordError"><i class="fas fa-exclamation-circle"></i>Min 8 characters</div>
          </div>

          <div class="field-group full-width">
            <label class="field-label" for="confirmPassword"><i class="fas fa-lock"></i>Confirm Password</label>
            <div class="field-input-wrap">
              <input type="password" id="confirmPassword" class="field-input" placeholder="Type it again" autocomplete="new-password" required>
            </div>
            <div class="field-error" id="confirmPasswordError"><i class="fas fa-exclamation-circle"></i>Passwords don't match</div>
          </div>
        </div>

        <button type="submit" class="auth-submit">
          Create Account <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <div class="auth-divider">or sign up with</div>
      <div class="social-row">
        <button type="button" class="social-btn google interactive"><i class="fab fa-google"></i>Google</button>
        <button type="button" class="social-btn apple interactive"><i class="fab fa-apple"></i>Apple</button>
      </div>

      <p class="auth-switch">Already exploring with us? <a href="signin.html">Sign In</a></p>
    </div>
  </section>
</main>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMessage">Account created!</span></div>

<script src="assets/js/sounds.js"></script>
<script src="assets/js/auth-ui.js"></script>
<script src="assets/js/auth.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof Auth !== 'undefined' && Auth.isLoggedIn()) {
      window.location.href = 'index.html';
      return;
    }

    const form = document.getElementById('signupForm');
    const firstName = document.getElementById('firstName');
    const lastName = document.getElementById('lastName');
    const dob = document.getElementById('dob');
    const signupEmail = document.getElementById('signupEmail');
    const signupPassword = document.getElementById('signupPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const genderRadios = document.querySelectorAll('input[name="gender"]');

    const firstNameError = document.getElementById('firstNameError');
    const lastNameError = document.getElementById('lastNameError');
    const dobError = document.getElementById('dobError');
    const genderError = document.getElementById('genderError');
    const signupEmailError = document.getElementById('signupEmailError');
    const signupPasswordError = document.getElementById('signupPasswordError');
    const confirmPasswordError = document.getElementById('confirmPasswordError');

    const toggleSignupPass = document.getElementById('toggleSignupPass');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');

    const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3')];
    const strengthHint = document.getElementById('strengthHint');

    toggleSignupPass.addEventListener('click', function() {
      const isHidden = signupPassword.type === 'password';
      signupPassword.type = isHidden ? 'text' : 'password';
      toggleSignupPass.innerHTML = isHidden ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
      if (typeof Sound !== 'undefined') Sound.pop();
    });

    function passwordScore(value) {
      let score = 0;
      if (value.length >= 8) score++;
      if (/[A-Z]/.test(value) && /[0-9]/.test(value)) score++;
      if (/[^A-Za-z0-9]/.test(value) && value.length >= 10) score++;
      return score;
    }

    function updateStrengthMeter() {
      const score = passwordScore(signupPassword.value);
      const labels = ['At least 8 characters', 'Good — add a number & capital', 'Strong password!'];
      const classes = ['weak', 'medium', 'strong'];

      bars.forEach((bar, i) => {
        bar.className = 'strength-bar';
        if (i < score) bar.classList.add(classes[Math.min(score, 3) - 1]);
      });

      strengthHint.textContent = signupPassword.value.length === 0
        ? 'At least 8 characters'
        : labels[Math.min(Math.max(score - 1, 0), 2)];
    }

    function setFieldState(input, errorEl, isValid) {
      if (!input || !errorEl) return;
      if (isValid) {
        input.classList.remove('error');
        errorEl.classList.remove('show');
      } else {
        input.classList.add('error');
        errorEl.classList.add('show');
      }
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    firstName.addEventListener('input', function() {
      setFieldState(firstName, firstNameError, firstName.value.trim().length > 1);
    });

    lastName.addEventListener('input', function() {
      setFieldState(lastName, lastNameError, lastName.value.trim().length > 1);
    });

    dob.addEventListener('input', function() {
      setFieldState(dob, dobError, dob.value.length > 0);
    });

    signupEmail.addEventListener('input', function() {
      setFieldState(signupEmail, signupEmailError, isValidEmail(signupEmail.value.trim()));
    });

    signupPassword.addEventListener('input', function() {
      updateStrengthMeter();
      setFieldState(signupPassword, signupPasswordError, signupPassword.value.length >= 8);
    });

    confirmPassword.addEventListener('input', function() {
      setFieldState(confirmPassword, confirmPasswordError, 
        confirmPassword.value === signupPassword.value && confirmPassword.value.length > 0);
    });

    genderRadios.forEach(function(radio) {
      radio.addEventListener('change', function() {
        genderError.classList.remove('show');
      });
    });

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const firstNameVal = firstName.value.trim();
      const lastNameVal = lastName.value.trim();
      const dobVal = dob.value;
      const emailVal = signupEmail.value.trim();
      const passwordVal = signupPassword.value;
      const confirmVal = confirmPassword.value;
      
      const genderValid = Array.from(genderRadios).some(function(r) { return r.checked; });

      const firstNameValid = firstNameVal.length > 1;
      const lastNameValid = lastNameVal.length > 1;
      const dobValid = dobVal.length > 0;
      const emailValid = isValidEmail(emailVal);
      const passwordValid = passwordVal.length >= 8;
      const confirmValid = confirmVal === passwordVal && confirmVal.length > 0;

      setFieldState(firstName, firstNameError, firstNameValid);
      setFieldState(lastName, lastNameError, lastNameValid);
      setFieldState(dob, dobError, dobValid);
      setFieldState(signupEmail, signupEmailError, emailValid);
      setFieldState(signupPassword, signupPasswordError, passwordValid);
      setFieldState(confirmPassword, confirmPasswordError, confirmValid);

      genderError.classList.toggle('show', !genderValid);

      if (firstNameValid && lastNameValid && dobValid && emailValid && passwordValid && confirmValid && genderValid) {
        const gender = Array.from(genderRadios).find(function(r) { return r.checked; })?.value || 'prefer-not';
        
        fetch('../Backend/signup.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            first_name: firstNameVal,
            last_name: lastNameVal,
            email: emailVal,
            password: passwordVal,
            dob: dobVal,
            gender: gender
          })
        })
        .then(function(response) {
          return response.json();
        })
        .then(function(data) {
          if (data.success) {
            localStorage.setItem('languageIslandUser', JSON.stringify({
              first_name: firstNameVal,
              email: emailVal
            }));

            toastMessage.textContent = '🎉 Welcome to Language Island, ' + firstNameVal + '!';
            toast.classList.remove('error');
            toast.classList.add('show');
            if (typeof Sound !== 'undefined') Sound.win();
            
            setTimeout(function() {
              window.location.href = 'index.html';
            }, 1500);
          } else {
            toastMessage.textContent = '❌ ' + data.message;
            toast.classList.add('error');
            toast.classList.add('show');
            if (typeof Sound !== 'undefined') Sound.locked();
          }
        })
        .catch(function(error) {
          toastMessage.textContent = '❌ Connection error. Please try again.';
          toast.classList.add('error');
          toast.classList.add('show');
          if (typeof Sound !== 'undefined') Sound.locked();
        });

      } else {
        if (typeof Sound !== 'undefined') Sound.locked();
        toastMessage.textContent = '❌ Please fix all errors before continuing.';
        toast.classList.add('error');
        toast.classList.add('show');
      }
    });

    // Hover sounds
    document.querySelectorAll('.brand, .auth-submit, .social-btn, .toggle-pass, .auth-switch a, .card-logo-img').forEach(function(el) {
      var hoverTimeout;
      el.addEventListener('mouseenter', function() {
        clearTimeout(hoverTimeout);
        hoverTimeout = setTimeout(function() {
          if (typeof Sound !== 'undefined') Sound.hover();
        }, 60);
      });
      el.addEventListener('mouseleave', function() {
        clearTimeout(hoverTimeout);
      });
      el.addEventListener('click', function() {
        if (typeof Sound !== 'undefined') Sound.pop();
      });
    });
  });
</script>

</body>
</html>
